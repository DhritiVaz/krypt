<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krypt — Secure Password Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
            letter-spacing: -1px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .card {
            background: #1e2130;
            border: 1px solid #2d3348;
            border-radius: 12px;
            padding: 2rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #2d3348;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f1117;
            border: 1px solid #2d3348;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        .btn:hover { background: #4f46e5; }
        .btn:disabled { background: #3d3f6e; cursor: not-allowed; }

        .message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }

        .message.error { background: #2d1f1f; color: #f87171; border: 1px solid #7f1d1d; }
        .message.success { background: #1f2d1f; color: #4ade80; border: 1px solid #14532d; }

        .strength-bar {
            height: 4px;
            background: #2d3348;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔐 Krypt</h1>
            <p>Secure Password Manager</p>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">Login</div>
                <div class="tab" onclick="showTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Master Password</label>
                    <input type="password" id="login-password" placeholder="••••••••••••">
                </div>
                <div class="form-group" id="totp-group" style="display:none;">
                    <label>2FA Code</label>
                    <input type="text" id="login-totp" placeholder="123456" maxlength="6">
                </div>
                <button class="btn" onclick="login()">Login</button>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Master Password</label>
                    <input type="password" id="reg-password" placeholder="Min 12 chars" oninput="checkStrength(this.value)">
                    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                </div>
                <button class="btn" onclick="register()">Create Account</button>
            </div>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            hideMessage();
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type}`;
            el.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function checkStrength(password) {
            const fill = document.getElementById('strength-fill');
            let score = 0;
            if (password.length >= 12) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#6366f1'];
            fill.style.width = `${score * 20}%`;
            fill.style.background = colors[score - 1] || '#2d3348';
        }

        async function register() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });

            const data = await res.json();
            if (res.ok) {
                showMessage('Account created! You can now log in.', 'success');
                setTimeout(() => showTab('login'), 1500);
            } else {
                const errors = data.errors ? Object.values(data.errors).flat().join(' ') : data.error;
                showMessage(errors, 'error');
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const totp = document.getElementById('login-totp').value;

            const body = {email, password};
            if (totp) body.totp_code = totp;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (res.ok) {
                // Store tokens and master password in sessionStorage
                sessionStorage.setItem('access_token', data.access_token);
                sessionStorage.setItem('refresh_token', data.refresh_token);
                sessionStorage.setItem('master_password', password);
                window.location.href = '/api/vault/dashboard';
            } else if (data.requires_2fa) {
                document.getElementById('totp-group').style.display = 'block';
                showMessage('Enter your 2FA code.', 'error');
            } else {
                showMessage(data.error || 'Login failed.', 'error');
            }
        }
    </script>
</body>
</html>
